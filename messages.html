<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Messages - The Talented Trove</title>
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<style>
  .messages-page {
    background-image: url('https://images.unsplash.com/photo-1521791136064-7986c2920216?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    min-height: 100vh;
  }

  .messages-container {
    background: rgba(255, 255, 255, 0.9);
    border-radius: 16px;
    padding: 30px;
    margin-top: 30px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    backdrop-filter: blur(10px);
    display: flex;
    height: calc(100vh - 120px);
  }

  .conversations-sidebar {
    width: 350px;
    border-right: 1px solid #eee;
    overflow-y: auto;
    padding-right: 20px;
  }

  .conversation-item {
    display: flex;
    align-items: center;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
  }

  .conversation-item:hover {
    background: #f5f7fa;
  }

  .conversation-item.active {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
  }

  .conversation-avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    margin-right: 15px;
    flex-shrink: 0;
  }

  .conversation-item.active .conversation-avatar {
    background: rgba(255,255,255,0.2);
  }

  .conversation-details {
    flex: 1;
    overflow: hidden;
  }

  .conversation-name {
    font-weight: 600;
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .conversation-preview {
    font-size: 0.9em;
    color: #666;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .conversation-item.active .conversation-preview {
    color: rgba(255,255,255,0.8);
  }

  .conversation-time {
    font-size: 0.8em;
    color: #999;
    margin-left: 10px;
    flex-shrink: 0;
  }

  .conversation-item.active .conversation-time {
    color: rgba(255,255,255,0.7);
  }

  .unread-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #ff5252;
    color: white;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8em;
    font-weight: bold;
  }

  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding-left: 20px;
  }

  .chat-header {
    display: flex;
    align-items: center;
    padding: 15px;
    border-bottom: 1px solid #eee;
    margin-bottom: 20px;
  }

  .chat-header .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    margin-right: 15px;
  }

  .chat-header h3 {
    margin: 0;
    color: #333;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    background: #f5f7fa;
    border-radius: 12px;
    margin-bottom: 20px;
  }

  .message {
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
  }

  .message.sent {
    align-items: flex-end;
  }

  .message.received {
    align-items: flex-start;
  }

  .message-content {
    max-width: 70%;
    padding: 15px;
    border-radius: 18px;
    position: relative;
  }

  .message.sent .message-content {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border-bottom-right-radius: 5px;
  }

  .message.received .message-content {
    background: white;
    color: #333;
    border-bottom-left-radius: 5px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  }

  .message-time {
    font-size: 0.8em;
    color: #888;
    margin-top: 5px;
  }

  .chat-input {
    display: flex;
    gap: 10px;
  }

  .chat-input input {
    flex: 1;
    padding: 15px;
    border: 1px solid #ddd;
    border-radius: 30px;
    font-size: 1em;
  }

  .chat-input button {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2em;
  }

  .chat-input button:hover {
    background: linear-gradient(135deg, #5a67d8, #6b46c1);
  }

  .no-conversation {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #999;
  }

  .no-conversation i {
    font-size: 4em;
    margin-bottom: 20px;
    color: #ddd;
  }

  .no-conversations {
    text-align: center;
    padding: 40px;
    color: #666;
  }

  .no-conversations i {
    font-size: 3em;
    color: #ddd;
    margin-bottom: 15px;
  }
</style>
</head>
<body class="messages-page">
<header class="header container">
  <div class="brand-left" style="display: flex; align-items: center; gap: 10px;">
    <img src="project logo.png" alt="The Talented Trove" class="logo-image">
    <h1>Messages</h1>
  </div>
  <nav>
    <a class="btn secondary" href="dashboard.html">Dashboard</a>
    <a class="btn secondary" href="profiles.html">Profiles</a>
    <a class="btn secondary" href="sessions.html">Sessions</a>
  </nav>
</header>

<main class="container messages-container">
  <div class="conversations-sidebar">
    <h2 style="margin-bottom: 20px;">Conversations</h2>
    <div id="conversationsList"></div>
  </div>
  
  <div class="chat-area">
    <div id="chatContainer">
      <div class="no-conversation">
        <i class="fas fa-comments"></i>
        <h3>Select a conversation to start chatting</h3>
      </div>
    </div>
  </div>
</main>

<script src="header.js"></script>
<script src="messages.js"></script>
</body>
</html>
