<!-- register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Register - The Talented Trove</title>
<link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
<div class="auth-container">
  <div class="background-img"></div>
  <div class="form-box">
    <h2>Create an Account</h2>
    <form id="registerForm" enctype="multipart/form-data">
      <div class="form-group">
        <label for="regUsername">Full Name</label>
        <input type="text" id="regUsername" placeholder="Your Name" required />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password" required />
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required />
      </div>
      <fieldset class="skills-fieldset">
        <legend>Skills & Details</legend>
        <div class="skill-group">
          <label for="teachSkill">Skill you can teach</label>
          <input type="text" id="teachSkill" placeholder="e.g., Graphic Design" required />
        </div>
        <div class="skill-group">
          <label for="learnSkill">Skill you want to learn</label>
          <input type="text" id="learnSkill" placeholder="e.g., Web Development" required />
        </div>
        <div class="skill-group">
          <label for="location">Your Location</label>
          <input type="text" id="location" placeholder="City, Country" />
        </div>
        <div class="skill-group">
          <label for="skillDetails">Additional info</label>
          <textarea id="skillDetails" rows="4" placeholder="More about your skills..."></textarea>
        </div>
        <div class="skill-group">
          <label for="certificate">Upload Certificate (Optional)</label>
          <input type="file" id="certificate" accept="image/*,.pdf" />
        </div>
      </fieldset>
      <button class="btn primary" type="submit">Register</button>
    </form>
    <p class="redirect-text">Already have an account? <a href="signup.html">Login here</a></p>
  </div>
</div>
<footer>
  <p>&copy; 2025 The Talented Trove | Contact: support@talentedtrove.com</p>
</footer>
<script src="form.js"></script>
</body>
</html>
