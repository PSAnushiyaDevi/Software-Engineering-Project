<!-- members.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>All Members - The Talented Trove</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="header container">
  <div class="brand-left" style="display: flex; align-items: center; gap: 10px;">
    <div class="logo">T</div>
    <h1>The Talented Trove</h1>
  </div>
  <nav>
    <a class="btn secondary" href="dashboard.html">Dashboard</a>
    <a class="btn secondary" href="profiles.html">Profiles</a>
    <a class="btn secondary" href="sessions.html">Sessions</a>
  </nav>
</header>

<main class="container">
  <h2>All Members</h2>
  <div id="members-container"></div>
</main>

<footer>
  <p>&copy; 2025 The Talented Trove | Contact: support@talentedtrove.com</p>
</footer>

<script src="header.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      const response = await fetch('/users');
      if (response.ok) {
        const users = await response.json();
        const container = document.getElementById('members-container');
        
        if (users.length === 0) {
          container.innerHTML = '<p>No members found.</p>';
          return;
        }

        container.innerHTML = users.map(user => `
          <div class="member-card">
            <div class="member-avatar">${user.name.charAt(0).toUpperCase()}</div>
            <div class="member-info">
              <h3>${user.name}</h3>
              <p><strong>Email:</strong> ${user.email}</p>
              <p><strong>Teaches:</strong> ${user.teachSkill}</p>
              <p><strong>Learns:</strong> ${user.learnSkill}</p>
              ${user.certificate ? `<p><a href="${user.certificate}" target="_blank" class="btn secondary">View Certificate</a></p>` : ''}
            </div>
          </div>
        `).join('');
      } else {
        container.innerHTML = '<p>Error loading members.</p>';
      }
    } catch (error) {
      console.error('Error fetching members:', error);
      document.getElementById('members-container').innerHTML = '<p>Error loading members. Please try again later.</p>';
    }
  });
</script>
</body>
</html>
