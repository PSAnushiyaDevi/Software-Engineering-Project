<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>My Profile - The Talented Trove</title>
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<style>
  /* Profile Page Specific Styles */
  .profile-page {
    background-image: url('https://plus.unsplash.com/premium_photo-1661371394983-42485fed3a58?ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8aGFuZHNoYWtlfGVufDB8fDB8fHww&fm=jpg&q=60&w=3000');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    min-height: 100vh;
  }

  .profile-container {
    background: rgba(255, 255, 255, 0.92);
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    overflow: hidden;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
  }

  .profile-header {
    background: linear-gradient(135deg, #667eea, #764ba2);
    padding: 40px;
    position: relative;
    overflow: hidden;
  }

  .profile-header::before {
    content: '';
    position: absolute;
    top: -50px;
    right: -50px;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
  }

  .profile-header::after {
    content: '';
    position: absolute;
    bottom: -70px;
    left: -70px;
    width: 250px;
    height: 250px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }

  .profile-avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.5em;
    margin-right: 30px;
    border: 4px solid rgba(255,255,255,0.3);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    position: relative;
    z-index: 2;
  }

  .profile-info {
    position: relative;
    z-index: 2;
  }

  .profile-info h2 {
    font-size: 2.5em;
    margin-bottom: 10px;
    color: white;
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
  }

  .profile-info p {
    margin: 5px 0;
    color: rgba(255,255,255,0.9);
    font-size: 1.1em;
  }

  .profile-content {
    padding: 40px;
  }

  .profile-section {
    margin-bottom: 35px;
    padding-bottom: 25px;
    border-bottom: 1px solid #eee;
    position: relative;
  }

  .profile-section:last-child {
    border-bottom: none;
  }

  .profile-section h3 {
    color: #333;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    font-size: 1.4em;
  }

  .profile-section h3 i {
    margin-right: 12px;
    color: #667eea;
    font-size: 1.2em;
  }

  .skill-tag {
    display: inline-block;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    padding: 12px 25px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 1.1em;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
  }

  .quote-section {
    text-align: center;
    margin-bottom: 40px;
    padding: 25px;
    background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
    border-radius: 15px;
    border-left: 5px solid #667eea;
  }

  .quote-section i {
    font-size: 2.5em;
    margin-bottom: 15px;
    color: #667eea;
  }

  .quote-section p {
    font-style: italic;
    font-size: 1.3em;
    color: #555;
    margin: 0;
  }

  .stats-container {
    display: flex;
    justify-content: space-around;
    margin: 30px 0;
    padding: 20px;
    background: #f8f9fa;
    border-radius: 15px;
  }

  .stat-item {
    text-align: center;
  }

  .stat-value {
    font-size: 2.5em;
    font-weight: 700;
    color: #667eea;
    margin-bottom: 5px;
  }

  .stat-label {
    color: #666;
    font-size: 0.9em;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #certificateDisplay img {
    max-width: 100%;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    transition: transform 0.3s ease;
  }

  #certificateDisplay img:hover {
    transform: scale(1.02);
  }

  .certificate-placeholder {
    padding: 30px;
    background: #f8f9fa;
    border-radius: 12px;
    text-align: center;
    border: 2px dashed #ddd;
  }

  .certificate-placeholder i {
    font-size: 3em;
    color: #ddd;
    margin-bottom: 15px;
  }
</style>
</head>
<body class="profile-page">
<header class="header container">
  <div class="brand-left" style="display: flex; align-items: center; gap: 10px;">
    <img src="project logo.png" alt="The Talented Trove" class="logo-image">
    <h1>The Talented Trove</h1>
  </div>
  <nav>
    <a class="btn secondary" href="dashboard.html">Dashboard</a>
    <a class="btn secondary" href="profiles.html">Profiles</a>
    <a class="btn secondary" href="sessions.html">Sessions</a>
    <a class="btn secondary" href="match.html">Find Matches</a>
    <a class="btn secondary" href="feedback.html">Feedback</a>
  </nav>
</header>

<main class="container">
  <div class="quote-section">
    <i class="fas fa-quote-left"></i>
    <p>"The expert in anything was once a beginner." - Helen Hayes</p>
  </div>

  <div class="profile-container">
    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar"></div>
      <div class="profile-info">
        <h2 id="profileName"></h2>
        <p id="profileEmail"></p>
        <p id="profileLocation"></p>
      </div>
    </div>
    
    <div class="stats-container">
      <div class="stat-item">
        <div class="stat-value" id="sessionCount">0</div>
        <div class="stat-label">Sessions</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="matchCount">0</div>
        <div class="stat-label">Matches</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="memberCount">0</div>
        <div class="stat-label">Community</div>
      </div>
    </div>
    
    <div class="profile-content">
      <div class="profile-section">
        <h3><i class="fas fa-chalkboard-teacher"></i> Skills I Teach</h3>
        <div class="skill-tag" id="teachSkill"></div>
      </div>
      
      <div class="profile-section">
        <h3><i class="fas fa-graduation-cap"></i> Skills I Want to Learn</h3>
        <div class="skill-tag" id="learnSkill"></div>
      </div>
      
      <div class="profile-section">
        <h3><i class="fas fa-info-circle"></i> About Me</h3>
        <p id="skillDetails"></p>
      </div>
      
      <div class="profile-section" id="certificateSection">
        <h3><i class="fas fa-certificate"></i> Certificate</h3>
        <div id="certificateDisplay"></div>
      </div>
    </div>
  </div>
</main>

<footer>
  <p>&copy; 2025 The Talented Trove | Contact: support@talentedtrove.com</p>
</footer>

<script src="header.js"></script>
<script src="profile.js"></script>
</body>
</html>
