<!-- signup.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sign In - The Talented Trove</title>
<link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
<div class="auth-container">
  <div class="background-img"></div>
  <div class="form-box">
    <h2>Sign In</h2>
    <form id="signupForm">
      <div class="form-group">
        <label for="username">Email</label>
        <input type="email" id="username" placeholder="your@email.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password" required />
      </div>
      <button class="btn primary" type="submit">Sign In</button>
    </form>
    <p class="redirect-text">Don't have an account? <a href="register.html">Register here</a></p>
  </div>
</div>
<footer>
  <p>&copy; 2025 The Talented Trove | Contact: support@talentedtrove.com</p>
</footer>
<script src="form.js"></script>
</body>
</html>
